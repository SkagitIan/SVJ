name = "skagitvalleyjobs"
main = "src/index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[browser]
binding = "BROWSER"

[[d1_databases]]
binding = "DB"
database_name = "skagitjobs"
database_id = "REPLACE_WITH_YOUR_D1_ID"

[[r2_buckets]]
binding = "R2"
bucket_name = "skagitjobs-careers"

[[queues.producers]]
binding = "SCOUT_QUEUE"
queue = "scout-queue"

[[queues.producers]]
binding = "CRAWL_QUEUE"
queue = "crawl-queue"

[[queues.producers]]
binding = "EXTRACT_QUEUE"
queue = "extract-queue"

[[queues.consumers]]
queue = "scout-queue"
max_batch_size = 5
max_batch_timeout = 10
max_retries = 3

[[queues.consumers]]
queue = "crawl-queue"
max_batch_size = 3
max_batch_timeout = 30
max_retries = 2

[[queues.consumers]]
queue = "extract-queue"
max_batch_size = 5
max_batch_timeout = 15
max_retries = 3

[triggers]
crons = ["0 3 * * *"]
