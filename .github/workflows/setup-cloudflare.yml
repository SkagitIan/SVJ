name: Setup Cloudflare Resources (run once)

# Run this manually ONCE from the GitHub Actions tab before deploying.
# It creates D1, R2, and all three queues, then prints the D1 database ID
# so you can add it as the CF_D1_DATABASE_ID repo secret.

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    name: Provision Cloudflare Resources

    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler
        run: npm install

      # ── D1 Database ──────────────────────────────────────────────────────
      - name: Create D1 database
        id: create_d1
        run: |
          OUTPUT=$(npx wrangler d1 create skagitjobs 2>&1) || true
          echo "$OUTPUT"
          # Parse the database_id from wrangler output
          DB_ID=$(echo "$OUTPUT" | grep -oP 'database_id\s*=\s*"\K[^"]+' || true)
          if [ -z "$DB_ID" ]; then
            # Already exists — fetch it
            DB_ID=$(npx wrangler d1 info skagitjobs --json 2>/dev/null | grep -oP '"uuid"\s*:\s*"\K[^"]+' || true)
          fi
          echo "D1_DATABASE_ID=$DB_ID" >> $GITHUB_OUTPUT
          echo "::notice title=ACTION REQUIRED::Add this as GitHub secret CF_D1_DATABASE_ID: $DB_ID"

      - name: Inject D1 ID into wrangler.toml
        run: |
          sed -i 's/REPLACE_WITH_YOUR_D1_ID/${{ steps.create_d1.outputs.D1_DATABASE_ID }}/' wrangler.toml
          echo "wrangler.toml updated with ID: ${{ steps.create_d1.outputs.D1_DATABASE_ID }}"

      - name: Apply D1 schema
        run: npx wrangler d1 execute skagitjobs --remote --file=schema.sql

      # ── R2 Bucket ────────────────────────────────────────────────────────
      - name: Create R2 bucket
        run: npx wrangler r2 bucket create skagitjobs-careers 2>&1 || echo "Bucket may already exist, continuing."

      # ── Queues ───────────────────────────────────────────────────────────
      - name: Create Queues
        run: |
          npx wrangler queues create scout-queue   2>&1 || echo "scout-queue may already exist"
          npx wrangler queues create crawl-queue   2>&1 || echo "crawl-queue may already exist"
          npx wrangler queues create extract-queue 2>&1 || echo "extract-queue may already exist"

      # ── Summary ──────────────────────────────────────────────────────────
      - name: Print setup summary
        run: |
          echo ""
          echo "============================================"
          echo "  Cloudflare resources ready!"
          echo "============================================"
          echo ""
          echo "  D1 Database ID: ${{ steps.create_d1.outputs.D1_DATABASE_ID }}"
          echo ""
          echo "  Next step:"
          echo "  Go to GitHub → Settings → Secrets → Actions"
          echo "  Add new secret:  CF_D1_DATABASE_ID"
          echo "  Value:           ${{ steps.create_d1.outputs.D1_DATABASE_ID }}"
          echo ""
          echo "  Then run the Deploy workflow."
          echo "============================================"
