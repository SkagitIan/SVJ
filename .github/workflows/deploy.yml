name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Worker

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Deploy Worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Push Worker secrets to Cloudflare
        run: |
          echo "${{ secrets.GEMINI_API_KEY }}"   | npx wrangler secret put GEMINI_API_KEY
          echo "${{ secrets.IMPORT_SECRET }}"    | npx wrangler secret put IMPORT_SECRET
          echo "${{ secrets.ADMIN_SECRET }}"     | npx wrangler secret put ADMIN_SECRET
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
