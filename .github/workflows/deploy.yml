name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Worker

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Inject D1 database ID into wrangler.toml
        run: |
          sed -i 's/REPLACE_WITH_YOUR_D1_ID/${{ secrets.CF_D1_DATABASE_ID }}/' wrangler.toml

      - name: Deploy Worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Push Worker secrets to Cloudflare
        run: |
          echo "${{ secrets.GEMINI_API_KEY }}"  | npx wrangler secret put GEMINI_API_KEY
          echo "${{ secrets.IMPORT_SECRET }}"   | npx wrangler secret put IMPORT_SECRET
          echo "${{ secrets.ADMIN_SECRET }}"    | npx wrangler secret put ADMIN_SECRET
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
